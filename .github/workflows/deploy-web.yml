name: Deploy foxsense-web

# main への push で foxsense-web をビルドし、VPS(nginx公開ディレクトリ)へ rsync 反映する。
# 手動実行(workflow_dispatch)も可。
on:
  push:
    branches: [main]
    paths:
      - 'foxsense-web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

# デプロイの多重実行を防止（後発を待たせ、走行中はキャンセル）
concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: foxsense-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: foxsense-web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://foxsense.smart-agri-vision.net/api

      # sav/kuma_rader の既存デプロイCIと同じ作法（secret名 VPS_SSH_KEY / ssh-keyscan / id_ed25519）
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 210.131.217.236 >> ~/.ssh/known_hosts

      - name: Deploy to VPS (rsync)
        # /var/www/foxsense/public は fox 書き込み可。直接rsyncでよい。
        # ※ 古いアセットも掃除したい場合は --delete を追加（firmware/ は public/ の外なので影響なし）。
        run: |
          rsync -rz \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            dist/ fox@210.131.217.236:/var/www/foxsense/public/

      - name: Fix permissions (nginx読取可能に 755/644)
        # rsyncの--chmodはrunner/umask依存で640になることがあり、nginx(www-data)が
        # world-read不可→403→画面真っ白になる。転送後に明示chmodで確実に755/644へ。
        # ファイルはfox所有のためsudo不要。
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no fox@210.131.217.236 \
            'find /var/www/foxsense/public -type d -exec chmod 755 {} + && \
             find /var/www/foxsense/public -type f -exec chmod 644 {} +'
