<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <!-- Arrowhead markers -->
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9CA3AF"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22C55E"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F97316"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#EF4444"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#A855F7"/>
    </marker>
    <!-- Drop shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B">FoxSense 親機 配線図</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#64748B">LILYGO T-SIM7080G-S3 + TWELITE DIP + BME280</text>

  <!-- ===== LILYGO T-SIM7080G-S3 (ESP32-S3) Center ===== -->
  <rect x="310" y="90" width="280" height="400" rx="14" ry="14" fill="#1E3A5F" filter="url(#shadow)"/>
  <rect x="310" y="90" width="280" height="36" rx="14" ry="14" fill="#1E3A5F"/>
  <rect x="310" y="108" width="280" height="18" fill="#1E3A5F"/>
  <text x="450" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">LILYGO T-SIM7080G-S3</text>
  <text x="450" y="133" text-anchor="middle" font-size="10" fill="#93C5FD">(ESP32-S3)</text>

  <!-- Left pin labels (ESP32) -->
  <!-- I2C SDA GPIO21 -->
  <text x="380" y="175" text-anchor="middle" font-size="9.5" fill="#FCD34D">GPIO21 (SDA)</text>
  <!-- I2C SCL GPIO22 -->
  <text x="380" y="215" text-anchor="middle" font-size="9.5" fill="#FCD34D">GPIO22 (SCL)</text>
  <!-- TWELITE TX GPIO17 -->
  <text x="380" y="275" text-anchor="middle" font-size="9.5" fill="#86EFAC">GPIO17 (TX2)</text>
  <!-- TWELITE RX GPIO16 -->
  <text x="380" y="305" text-anchor="middle" font-size="9.5" fill="#86EFAC">GPIO16 (RX2)</text>
  <!-- BATTERY ADC GPIO35 -->
  <text x="380" y="365" text-anchor="middle" font-size="9.5" fill="#FCA5A5">GPIO35 (ADC)</text>

  <!-- Right pin labels (ESP32) -->
  <!-- SIM7080G TX GPIO5 -->
  <text x="522" y="335" text-anchor="middle" font-size="9.5" fill="#C4B5FD">GPIO5 (TX1)</text>
  <!-- SIM7080G RX GPIO4 -->
  <text x="522" y="365" text-anchor="middle" font-size="9.5" fill="#C4B5FD">GPIO4 (RX1)</text>
  <!-- PWRKEY GPIO41 -->
  <text x="522" y="395" text-anchor="middle" font-size="9.5" fill="#C4B5FD">GPIO41 (PWRKEY)</text>
  <!-- DTR GPIO42 -->
  <text x="522" y="425" text-anchor="middle" font-size="9.5" fill="#C4B5FD">GPIO42 (DTR)</text>

  <!-- 3.3V / GND labels inside ESP32 -->
  <text x="450" y="460" text-anchor="middle" font-size="9.5" fill="#94A3B8">3.3V ── GND</text>
  <text x="450" y="478" text-anchor="middle" font-size="9" fill="#64748B">(電源 / SIM共通)</text>

  <!-- Pin dot left -->
  <circle cx="316" cy="172" r="4" fill="#FCD34D"/>
  <circle cx="316" cy="212" r="4" fill="#FCD34D"/>
  <circle cx="316" cy="272" r="4" fill="#86EFAC"/>
  <circle cx="316" cy="302" r="4" fill="#86EFAC"/>
  <circle cx="316" cy="362" r="4" fill="#FCA5A5"/>

  <!-- Pin dot right -->
  <circle cx="584" cy="332" r="4" fill="#C4B5FD"/>
  <circle cx="584" cy="362" r="4" fill="#C4B5FD"/>
  <circle cx="584" cy="392" r="4" fill="#C4B5FD"/>
  <circle cx="584" cy="422" r="4" fill="#C4B5FD"/>

  <!-- ===== BME280 (top-left) ===== -->
  <rect x="60" y="120" width="160" height="120" rx="10" ry="10" fill="#78350F" filter="url(#shadow)"/>
  <text x="140" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">BME280</text>
  <text x="140" y="161" text-anchor="middle" font-size="10" fill="#FDE68A">温度/湿度/気圧</text>
  <!-- BME pins -->
  <text x="140" y="183" text-anchor="middle" font-size="9.5" fill="#FCD34D">SDA → GPIO21</text>
  <text x="140" y="200" text-anchor="middle" font-size="9.5" fill="#FCD34D">SCL → GPIO22</text>
  <text x="140" y="217" text-anchor="middle" font-size="9.5" fill="#93C5FD">VCC (3.3V)</text>
  <text x="140" y="231" text-anchor="middle" font-size="9.5" fill="#94A3B8">GND</text>
  <!-- BME right side dots -->
  <circle cx="220" cy="180" r="4" fill="#FCD34D"/>
  <circle cx="220" cy="197" r="4" fill="#FCD34D"/>
  <circle cx="220" cy="214" r="4" fill="#3B82F6"/>
  <circle cx="220" cy="228" r="4" fill="#6B7280"/>

  <!-- I2C lines BME → ESP32 -->
  <!-- SDA yellow -->
  <line x1="220" y1="180" x2="265" y2="180" stroke="#FCD34D" stroke-width="2.5"/>
  <line x1="265" y1="180" x2="265" y2="172" stroke="#FCD34D" stroke-width="2.5"/>
  <line x1="265" y1="172" x2="312" y2="172" stroke="#FCD34D" stroke-width="2.5" marker-end="url(#arrow-gray)"/>
  <!-- SCL yellow -->
  <line x1="220" y1="197" x2="258" y2="197" stroke="#EAB308" stroke-width="2.5"/>
  <line x1="258" y1="197" x2="258" y2="212" stroke="#EAB308" stroke-width="2.5"/>
  <line x1="258" y1="212" x2="312" y2="212" stroke="#EAB308" stroke-width="2.5" marker-end="url(#arrow-gray)"/>
  <!-- VCC blue -->
  <line x1="220" y1="214" x2="250" y2="214" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="232" y="228" text-anchor="middle" font-size="8.5" fill="#3B82F6">3.3V</text>
  <!-- GND -->
  <line x1="220" y1="228" x2="250" y2="228" stroke="#6B7280" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="233" y="242" text-anchor="middle" font-size="8.5" fill="#6B7280">GND</text>

  <!-- Label I2C -->
  <rect x="265" y="183" width="44" height="14" rx="3" fill="#78350F"/>
  <text x="287" y="193" text-anchor="middle" font-size="8" fill="#FDE68A">I2C</text>

  <!-- ===== TWELITE DIP (left-center) ===== -->
  <rect x="50" y="280" width="180" height="160" rx="10" ry="10" fill="#14532D" filter="url(#shadow)"/>
  <text x="140" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">TWELITE DIP</text>
  <text x="140" y="321" text-anchor="middle" font-size="10" fill="#86EFAC">親機 (LID=0x00)</text>
  <!-- TWELITE pins -->
  <text x="140" y="345" text-anchor="middle" font-size="9.5" fill="#86EFAC">RXD (DI) ← GPIO17</text>
  <text x="140" y="362" text-anchor="middle" font-size="9.5" fill="#86EFAC">TXD (DO) → GPIO16</text>
  <text x="140" y="379" text-anchor="middle" font-size="9.5" fill="#93C5FD">VCC (3.3V)</text>
  <text x="140" y="393" text-anchor="middle" font-size="9.5" fill="#94A3B8">GND</text>
  <text x="140" y="410" text-anchor="middle" font-size="9" fill="#6EE7B7">DIO12→GND: 設定モード</text>
  <text x="140" y="424" text-anchor="middle" font-size="9" fill="#A3E635">2.4GHz RF ↔ 子機</text>

  <!-- TWELITE right side dots -->
  <circle cx="230" cy="342" r="4" fill="#22C55E"/>
  <circle cx="230" cy="359" r="4" fill="#22C55E"/>
  <circle cx="230" cy="376" r="4" fill="#3B82F6"/>
  <circle cx="230" cy="390" r="4" fill="#6B7280"/>

  <!-- UART lines TWELITE → ESP32 -->
  <!-- TX2 (GPIO17) → TWELITE RXD  green -->
  <line x1="230" y1="342" x2="275" y2="342" stroke="#22C55E" stroke-width="2.5"/>
  <line x1="275" y1="342" x2="275" y2="272" stroke="#22C55E" stroke-width="2.5"/>
  <line x1="275" y1="272" x2="312" y2="272" stroke="#22C55E" stroke-width="2.5" marker-end="url(#arrow-gray)"/>
  <!-- RX2 (GPIO16) ← TWELITE TXD green-dark -->
  <line x1="230" y1="359" x2="283" y2="359" stroke="#16A34A" stroke-width="2.5"/>
  <line x1="283" y1="359" x2="283" y2="302" stroke="#16A34A" stroke-width="2.5"/>
  <line x1="283" y1="302" x2="312" y2="302" stroke="#16A34A" stroke-width="2.5" marker-end="url(#arrow-gray)"/>
  <!-- VCC -->
  <line x1="230" y1="376" x2="255" y2="376" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="242" y="389" text-anchor="middle" font-size="8.5" fill="#3B82F6">3.3V</text>
  <!-- GND -->
  <line x1="230" y1="390" x2="255" y2="390" stroke="#6B7280" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="242" y="404" text-anchor="middle" font-size="8.5" fill="#6B7280">GND</text>

  <!-- Label UART2 -->
  <rect x="268" y="310" width="50" height="14" rx="3" fill="#14532D"/>
  <text x="293" y="320" text-anchor="middle" font-size="8" fill="#86EFAC">UART2</text>

  <!-- ===== SIM7080G (right) ===== -->
  <rect x="660" y="240" width="200" height="200" rx="10" ry="10" fill="#312E81" filter="url(#shadow)"/>
  <text x="760" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">SIM7080G</text>
  <text x="760" y="281" text-anchor="middle" font-size="10" fill="#C4B5FD">LTE Cat-M1/NB-IoT</text>
  <!-- SIM pins -->
  <text x="760" y="308" text-anchor="middle" font-size="9.5" fill="#C4B5FD">RXD ← GPIO5</text>
  <text x="760" y="325" text-anchor="middle" font-size="9.5" fill="#C4B5FD">TXD → GPIO4</text>
  <text x="760" y="342" text-anchor="middle" font-size="9.5" fill="#C4B5FD">PWRKEY ← GPIO41</text>
  <text x="760" y="359" text-anchor="middle" font-size="9.5" fill="#C4B5FD">DTR ← GPIO42</text>
  <text x="760" y="376" text-anchor="middle" font-size="9.5" fill="#93C5FD">VCC (3.8V / LiPo)</text>
  <text x="760" y="390" text-anchor="middle" font-size="9.5" fill="#94A3B8">GND</text>
  <text x="760" y="412" text-anchor="middle" font-size="9" fill="#818CF8">SIMカード スロット</text>
  <text x="760" y="426" text-anchor="middle" font-size="9" fill="#38BDF8">LTEアンテナ (外付け)</text>

  <!-- SIM left side dots -->
  <circle cx="660" cy="305" r="4" fill="#A855F7"/>
  <circle cx="660" cy="322" r="4" fill="#A855F7"/>
  <circle cx="660" cy="339" r="4" fill="#A855F7"/>
  <circle cx="660" cy="356" r="4" fill="#A855F7"/>

  <!-- UART1 lines ESP32 → SIM7080G -->
  <!-- GPIO5 TX1 → SIM RXD -->
  <line x1="588" y1="332" x2="620" y2="332" stroke="#A855F7" stroke-width="2.5"/>
  <line x1="620" y1="332" x2="620" y2="305" stroke="#A855F7" stroke-width="2.5"/>
  <line x1="620" y1="305" x2="656" y2="305" stroke="#A855F7" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <!-- GPIO4 RX1 ← SIM TXD -->
  <line x1="588" y1="362" x2="630" y2="362" stroke="#9333EA" stroke-width="2.5"/>
  <line x1="630" y1="362" x2="630" y2="322" stroke="#9333EA" stroke-width="2.5"/>
  <line x1="630" y1="322" x2="656" y2="322" stroke="#9333EA" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <!-- GPIO41 PWRKEY -->
  <line x1="588" y1="392" x2="640" y2="392" stroke="#7C3AED" stroke-width="2"/>
  <line x1="640" y1="392" x2="640" y2="339" stroke="#7C3AED" stroke-width="2"/>
  <line x1="640" y1="339" x2="656" y2="339" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <!-- GPIO42 DTR -->
  <line x1="588" y1="422" x2="648" y2="422" stroke="#6D28D9" stroke-width="2"/>
  <line x1="648" y1="422" x2="648" y2="356" stroke="#6D28D9" stroke-width="2"/>
  <line x1="648" y1="356" x2="656" y2="356" stroke="#6D28D9" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Label UART1 -->
  <rect x="600" y="338" width="50" height="14" rx="3" fill="#312E81"/>
  <text x="625" y="348" text-anchor="middle" font-size="8" fill="#C4B5FD">UART1</text>

  <!-- ===== Battery voltage divider (bottom-left) ===== -->
  <rect x="60" y="480" width="180" height="80" rx="10" ry="10" fill="#7F1D1D" filter="url(#shadow)"/>
  <text x="150" y="503" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">電圧分圧回路</text>
  <text x="150" y="520" text-anchor="middle" font-size="9.5" fill="#FCA5A5">LiPo+ → R1 → ADC → R2 → GND</text>
  <text x="150" y="535" text-anchor="middle" font-size="9.5" fill="#FCA5A5">GPIO35 (ADC) で電池残量測定</text>
  <text x="150" y="550" text-anchor="middle" font-size="9" fill="#FDA4AF">Max 3.3V (分圧後)</text>

  <!-- Battery → ESP32 GPIO35 -->
  <circle cx="240" cy="520" r="4" fill="#EF4444"/>
  <line x1="240" y1="520" x2="285" y2="520" stroke="#EF4444" stroke-width="2.5"/>
  <line x1="285" y1="520" x2="285" y2="362" stroke="#EF4444" stroke-width="2.5"/>
  <line x1="285" y1="362" x2="312" y2="362" stroke="#EF4444" stroke-width="2.5" marker-end="url(#arrow-red)"/>

  <!-- ===== LiPo Battery (bottom-right) ===== -->
  <rect x="650" y="480" width="200" height="80" rx="10" ry="10" fill="#44403C" filter="url(#shadow)"/>
  <text x="750" y="503" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">LiPoバッテリー</text>
  <text x="750" y="520" text-anchor="middle" font-size="9.5" fill="#D6D3D1">3.7V / 2000mAh (推奨)</text>
  <text x="750" y="537" text-anchor="middle" font-size="9.5" fill="#D6D3D1">T-SIM7080G-S3 内蔵コネクタ</text>
  <text x="750" y="553" text-anchor="middle" font-size="9" fill="#A8A29E">充電: USB-C または 太陽光パネル</text>

  <!-- ===== Internet cloud (top-right) ===== -->
  <ellipse cx="790" cy="120" rx="80" ry="40" fill="#BAE6FD" opacity="0.5"/>
  <ellipse cx="750" cy="130" rx="50" ry="32" fill="#BAE6FD" opacity="0.5"/>
  <ellipse cx="830" cy="130" rx="50" ry="32" fill="#BAE6FD" opacity="0.5"/>
  <text x="790" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#0369A1">Internet</text>
  <text x="790" y="134" text-anchor="middle" font-size="10" fill="#0369A1">LTE / HTTP</text>
  <!-- Arrow from SIM to cloud -->
  <line x1="760" y1="240" x2="780" y2="168" stroke="#38BDF8" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>

  <!-- ===== Child TWELITE (bottom, RF link) ===== -->
  <rect x="310" y="510" width="280" height="60" rx="10" ry="10" fill="#134E4A" filter="url(#shadow)"/>
  <text x="450" y="533" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">子機 TWELITE DIP × N台</text>
  <text x="450" y="550" text-anchor="middle" font-size="10" fill="#5EEAD4">BME280 + 単4電池×2</text>
  <text x="450" y="565" text-anchor="middle" font-size="9" fill="#99F6E4">APP_ID=0x46534E53  CH=13  2.4GHz</text>

  <!-- RF arrow between child TWELITE and parent TWELITE -->
  <line x1="140" y1="440" x2="140" y2="475" stroke="#A3E635" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="140" y1="475" x2="340" y2="509" stroke="#A3E635" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="235" y="495" text-anchor="middle" font-size="9" fill="#A3E635">RF 2.4GHz</text>

  <!-- ===== Legend ===== -->
  <rect x="660" y="90" width="200" height="138" rx="8" ry="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="760" y="110" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">凡例</text>
  <!-- I2C -->
  <line x1="675" y1="124" x2="700" y2="124" stroke="#FCD34D" stroke-width="2.5"/>
  <text x="710" y="128" font-size="10" fill="#334155">I2C (SDA/SCL)</text>
  <!-- UART2 -->
  <line x1="675" y1="142" x2="700" y2="142" stroke="#22C55E" stroke-width="2.5"/>
  <text x="710" y="146" font-size="10" fill="#334155">UART2 (TWELITE)</text>
  <!-- UART1 -->
  <line x1="675" y1="160" x2="700" y2="160" stroke="#A855F7" stroke-width="2.5"/>
  <text x="710" y="164" font-size="10" fill="#334155">UART1 (SIM7080G)</text>
  <!-- ADC -->
  <line x1="675" y1="178" x2="700" y2="178" stroke="#EF4444" stroke-width="2.5"/>
  <text x="710" y="182" font-size="10" fill="#334155">ADC (電圧測定)</text>
  <!-- RF -->
  <line x1="675" y1="196" x2="700" y2="196" stroke="#A3E635" stroke-width="2.5" stroke-dasharray="5,3"/>
  <text x="710" y="200" font-size="10" fill="#334155">RF 2.4GHz (無線)</text>
  <!-- Power -->
  <line x1="675" y1="214" x2="700" y2="214" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="710" y="218" font-size="10" fill="#334155">電源 / GND</text>

</svg>
